# 谢尔宾斯基地毯实验配置
experiment:
  name: "Sierpinski Carpet Fingerprint Analysis"
  version: "1.0.0"
  date: "2024-07-31"
  author: "Unclosed Mathematics Research Group"

# 计算精度设置
precision:
  dps: 50                    # 十进制计算精度 (decimal places)
  max_cf_terms: 100          # 最大连分数项数
  pslq_maxcoeff: 1000        # PSLQ算法最大系数
  series_terms: 10           # 级数计算项数

# 分析参数
analysis:
  large_quotient_threshold: 100  # 巨大偏商阈值
  convergence_tolerance: 1e-15   # 收敛容差
  save_raw_data: true            # 是否保存原始数据

# 可视化设置
visualization:
  dpi: 150                      # 图片分辨率
  figsize: [12, 8]              # 图表尺寸 (宽, 高)
  style: "seaborn-v0_8-whitegrid"  # 绘图样式
  save_format: "png"            # 图片保存格式

# 文件路径设置
paths:
  data_dir: "./data"
  results_dir: "./results"
  figures_dir: "./figures"
  notebooks_dir: "./notebooks"
  scripts_dir: "./scripts"